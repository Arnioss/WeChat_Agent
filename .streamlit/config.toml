[server]
headless = false
address = "0.0.0.0"
port = 8501
# 本地开发：关闭 XSRF 可避免部分环境下 WebSocket/静态资源异常导致白屏
enableXsrfProtection = false
enableCORS = false
maxUploadSize = 200

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[runner]
fastReruns = true
magicEnabled = false

[client]
showErrorDetails = true
toolbarMode = "minimal"

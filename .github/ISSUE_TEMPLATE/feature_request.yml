name: 功能建议
description: 提交新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出改进建议。请说明场景、价值与可行方案。

  - type: textarea
    id: pain
    attributes:
      label: 背景与痛点
      description: 当前遇到什么问题？
      placeholder: 描述业务场景与限制
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望如何实现？
      placeholder: 可以包括接口、配置、流程变化
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他方案？

  - type: textarea
    id: impact
    attributes:
      label: 影响评估
      description: 对兼容性、性能、运维的影响
